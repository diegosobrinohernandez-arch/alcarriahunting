<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diagnóstico Digital · Orgánica de Caza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0C0E09;
    --bg2:        #111409;
    --bg3:        #161A0E;
    --green:      #2D6228;
    --green-mid:  #3D7A33;
    --green-light:#5A9E4E;
    --gold:       #C49A28;
    --gold-light: #D4AE4A;
    --cream:      #E8E0CC;
    --muted:      #7A7A68;
    --border:     rgba(196,154,40,0.2);
    --radius:     14px;
    --input-h:    52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    flex-shrink: 0;
    padding: 16px 24px 12px;
    background: var(--bg);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .topbar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .topbar-title {
    font-family: 'Cormorant', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.01em;
  }

  .topbar-counter {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  /* ── SCREENS ── */
  .screens {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    padding: 32px 24px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transform: translateX(40px);
    transition: opacity 0.35s cubic-bezier(0.16,1,0.3,1), transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }

  .screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }

  .screen.exit {
    opacity: 0;
    transform: translateX(-40px);
  }

  /* ── INTRO SCREEN ── */
  .intro-badge {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 5px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    background: rgba(196,154,40,0.06);
    align-self: flex-start;
  }

  .intro-title {
    font-family: 'Cormorant', serif;
    font-size: 38px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .intro-title em {
    font-style: italic;
    color: var(--gold-light);
  }

  .intro-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.85;
    margin-bottom: 32px;
  }

  .intro-time {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: rgba(45,98,40,0.12);
    border: 1px solid rgba(45,98,40,0.3);
    border-radius: var(--radius);
    margin-bottom: 40px;
  }

  .intro-time span:first-child { font-size: 22px; }

  .intro-time-text {
    font-size: 13px;
    color: #9ABF96;
    line-height: 1.5;
  }

  .intro-time-text strong { color: var(--cream); font-weight: 600; }

  /* ── QUESTION ── */
  .q-block {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--green-light);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .q-title {
    font-family: 'Cormorant', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  .q-hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* ── OPTIONS ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg3);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    min-height: 52px;
    user-select: none;
  }

  .opt:active { transform: scale(0.98); }

  .opt.selected {
    background: rgba(45,98,40,0.2);
    border-color: var(--green-mid);
  }

  .opt-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .opt.selected .opt-check {
    background: var(--green-mid);
    border-color: var(--green-mid);
  }

  .opt-check svg { display: none; }
  .opt.selected .opt-check svg { display: block; }

  .opt-check-square {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .opt.selected .opt-check-square {
    background: var(--green-mid);
    border-color: var(--green-mid);
  }

  .opt-check-square svg { display: none; }
  .opt.selected .opt-check-square svg { display: block; }

  .opt-label {
    font-size: 14px;
    color: var(--cream);
    font-weight: 400;
    line-height: 1.4;
  }

  .opt.selected .opt-label { font-weight: 500; }

  /* ── TEXT INPUT ── */
  .text-input {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
    resize: none;
    min-height: var(--input-h);
  }

  .text-input:focus {
    border-color: var(--green-mid);
  }

  .text-input::placeholder { color: var(--muted); }

  .num-input {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s ease;
    -moz-appearance: textfield;
    text-align: center;
  }

  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .num-input:focus { border-color: var(--green-mid); }
  .num-input::placeholder { color: var(--muted); font-size: 16px; font-weight: 400; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    flex-shrink: 0;
    padding: 12px 24px 28px;
    background: var(--bg);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 12px;
  }

  .btn-back {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .btn-back:active { transform: scale(0.95); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    flex: 1;
    height: 52px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--green), var(--green-mid));
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }

  .btn-next:active { transform: scale(0.98); opacity: 0.9; }
  .btn-next:disabled { opacity: 0.35; cursor: default; }

  .btn-next.gold {
    background: linear-gradient(135deg, #9B6200, var(--gold));
  }

  .btn-skip {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── FINAL SCREEN ── */
  .final-wrap {
    text-align: center;
    padding-top: 20px;
  }

  .final-icon { font-size: 52px; margin-bottom: 20px; }

  .final-title {
    font-family: 'Cormorant', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .final-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .btn-whatsapp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    background: #25D366;
    border: none;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    text-decoration: none;
    margin-bottom: 12px;
  }

  .btn-whatsapp:active { opacity: 0.85; }

  /* ── GRAIN ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar" style="display:none">
    <div class="topbar-row">
      <div class="topbar-title">Diagnóstico Digital</div>
      <div class="topbar-counter" id="counter">1 / 31</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:3%"></div>
    </div>
  </div>

  <div class="screens" id="screens"></div>

  <div class="bottom-nav" id="bottom-nav">
    <button class="btn-back" id="btn-back" onclick="goBack()" disabled>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="btn-next" id="btn-next" onclick="goNext()">Comenzar</button>
  </div>
</div>

<script>
// ─── PREGUNTAS ────────────────────────────────────────────────────────────
const BLOQUE = {
  A: "La orgánica hoy",
  B: "El techo que imagináis",
  C: "Captación",
  D: "Atención y ventas",
  E: "Reservas y cobros",
  F: "Gestión interna",
  G: "Fidelización",
  H: "Presencia digital",
  I: "Tiempo en gestión",
  J: "Objetivos y frenos"
};

const questions = [
  // ── INTRO (idx -1, handled separately)
  // ── A
  { id: 1,  block: "A", type: "text",   q: "¿Cómo se llama vuestra orgánica?", placeholder: "Nombre de la orgánica", optional: false },
  { id: 2,  block: "A", type: "text",   q: "¿En qué provincia o provincias operáis?", placeholder: "Ej: Toledo, Ciudad Real", optional: false },
  { id: 3,  block: "A", type: "number", q: "¿Cuántas monterías organizáis al año actualmente?", placeholder: "0", optional: false },
  { id: 4,  block: "A", type: "number", q: "¿Cuántos recechos organizáis al año actualmente?", placeholder: "0", optional: false },
  { id: 5,  block: "A", type: "single", q: "¿Cuántos cazadores activos tenéis en vuestra base de datos?",
    opts: ["Menos de 50", "50 – 150", "150 – 300", "Más de 300"] },
  { id: 6,  block: "A", type: "single", q: "¿Cuál es vuestra facturación anual aproximada?",
    opts: ["Menos de 50.000 €", "50.000 – 100.000 €", "100.000 – 200.000 €", "Más de 200.000 €"] },

  // ── B
  { id: 7,  block: "B", type: "number", q: "¿Cuántas monterías al año en vuestro momento de máximo crecimiento?", placeholder: "0", optional: true },
  { id: 8,  block: "B", type: "number", q: "¿Cuántos recechos al año en vuestro momento de máximo crecimiento?", placeholder: "0", optional: true },
  { id: 9,  block: "B", type: "single", q: "¿Cuál sería vuestra facturación objetivo en ese momento?",
    opts: ["50.000 – 100.000 €", "100.000 – 200.000 €", "200.000 – 500.000 €", "Más de 500.000 €"] },

  // ── C
  { id: 10, block: "C", type: "multi",  q: "¿Cómo os llegan los cazadores principalmente?", hint: "Podéis marcar varias",
    opts: ["Boca a boca", "Redes sociales", "Web propia", "Agencias colaboradoras", "Ferias de caza", "Otros"] },
  { id: 11, block: "C", type: "single", q: "¿Cuántos contactos nuevos recibís al año aproximadamente?",
    opts: ["Menos de 50", "50 – 150", "150 – 300", "Más de 300"] },
  { id: 12, block: "C", type: "single", q: "De cada 10 contactos nuevos, ¿cuántos acaban reservando?",
    opts: ["1 – 2", "3 – 4", "5 – 6", "7 o más"] },

  // ── D
  { id: 13, block: "D", type: "multi",  q: "¿Cómo gestionáis las consultas de los cazadores?", hint: "Podéis marcar varias",
    opts: ["WhatsApp personal", "WhatsApp Business", "Llamadas", "Email", "Otros"] },
  { id: 14, block: "D", type: "single", q: "¿Cuánto tiempo dedicáis a la semana a responder consultas y hacer seguimiento?",
    opts: ["Menos de 2 horas", "2 – 5 horas", "5 – 10 horas", "Más de 10 horas"] },
  { id: 15, block: "D", type: "single", q: "¿Creéis que se os escapan cazadores por falta de respuesta rápida o seguimiento?",
    opts: ["Sí, bastantes", "Sí, algunos", "Pocos", "No"] },

  // ── E
  { id: 16, block: "E", type: "multi",  q: "¿Cómo se reserva un puesto actualmente?", hint: "Podéis marcar varias",
    opts: ["Llamada telefónica", "WhatsApp", "Email", "Formulario en la web", "Otros"] },
  { id: 17, block: "E", type: "multi",  q: "¿Cómo cobráis la señal?", hint: "Podéis marcar varias",
    opts: ["Transferencia manual", "Efectivo", "Pasarela de pago online", "No cobramos señal"] },

  // ── F
  { id: 18, block: "F", type: "multi",  q: "¿Cómo tenéis organizados los datos de vuestros cazadores?", hint: "Podéis marcar varias",
    opts: ["Agenda del móvil", "Excel / hojas de cálculo", "WhatsApp", "CRM (software de clientes)", "No tenemos sistema claro", "Otros"] },
  { id: 19, block: "F", type: "multi",  q: "¿Cómo controláis los cupos disponibles de cada evento?", hint: "Podéis marcar varias",
    opts: ["Excel", "Papel o libreta", "De cabeza", "Software o app", "Otros"] },
  { id: 20, block: "F", type: "multi",  q: "¿Cómo lleváis el control de pagos y cobros?", hint: "Podéis marcar varias",
    opts: ["Excel", "Contabilidad manual", "Software de facturación", "No llevamos control detallado"] },

  // ── G
  { id: 21, block: "G", type: "single", q: "¿Hacéis algo después de cada evento para mantener el contacto con los cazadores?",
    opts: ["Sí, de forma sistemática", "Sí, pero de forma manual y ocasional", "No"] },
  { id: 22, block: "G", type: "single", q: "¿Qué porcentaje de vuestros cazadores repite cada temporada?",
    opts: ["Menos del 25%", "25 – 50%", "50 – 75%", "Más del 75%"] },
  { id: 23, block: "G", type: "single", q: "¿Reactiváis a cazadores que llevan más de una temporada sin reservar?",
    opts: ["Sí, de forma activa", "A veces, de forma manual", "No"] },

  // ── H
  { id: 24, block: "H", type: "single", q: "¿Tenéis web propia?",
    opts: ["Sí y está actualizada", "Sí pero está desactualizada", "No tenemos web"] },
  { id: 25, block: "H", type: "multi",  q: "¿Usáis redes sociales para la orgánica?", hint: "Podéis marcar varias",
    opts: ["Instagram", "Facebook", "YouTube", "No usamos redes", "Otros"] },
  { id: 26, block: "H", type: "single", q: "¿Habéis hecho publicidad online alguna vez?",
    opts: ["Sí, con buenos resultados", "Sí, pero sin resultados claros", "No hemos hecho publicidad online"] },

  // ── I
  { id: 27, block: "I", type: "single", q: "¿Cuántas horas semanales dedicáis en total a gestión (reservas, atención, cobros, administración)?",
    opts: ["Menos de 5 horas", "5 – 10 horas", "10 – 20 horas", "Más de 20 horas"] },
  { id: 28, block: "I", type: "textarea", q: "¿Qué tarea os consume más tiempo innecesariamente?", placeholder: "Ej: responder siempre los mismos mensajes de WhatsApp...", optional: true },

  // ── J
  { id: 29, block: "J", type: "textarea", q: "¿Cuáles son vuestros dos o tres objetivos principales para los próximos dos años?", placeholder: "Ej: doblar el número de monterías, captar agencias...", optional: false },
  { id: 30, block: "J", type: "textarea", q: "¿Qué es lo que más os frena para crecer?", placeholder: "Ej: falta de tiempo, pocos cazadores nuevos, gestión manual...", optional: false },
  { id: 31, block: "J", type: "textarea", q: "Si pudierais delegar una sola tarea de gestión, ¿cuál sería?", placeholder: "Ej: responder WhatsApps, hacer seguimiento...", optional: true },
];

// ─── STATE ────────────────────────────────────────────────────────────────
let current = -1; // -1 = intro
let answers = {};
const TOTAL = questions.length;

// ─── RENDER ───────────────────────────────────────────────────────────────
function init() {
  renderIntro();
  renderQuestions();
  renderFinal();
  showScreen(-1);
}

function renderIntro() {
  const el = document.createElement('div');
  el.className = 'screen';
  el.id = 'screen--1';
  el.innerHTML = `
    <div class="intro-badge">Diagnóstico Digital</div>
    <h1 class="intro-title">Cuéntanos<br>cómo funciona<br><em>vuestra orgánica</em></h1>
    <p class="intro-desc">Unas preguntas rápidas para entender cómo trabajáis y ver dónde podemos ayudaros a crecer.</p>
    <div class="intro-time">
      <span>⏱</span>
      <div class="intro-time-text"><strong>5 minutos</strong> para completarlo.<br>La mayoría de preguntas son un solo clic.</div>
    </div>
  `;
  document.getElementById('screens').appendChild(el);
}

function renderQuestions() {
  questions.forEach((q, i) => {
    const el = document.createElement('div');
    el.className = 'screen';
    el.id = `screen-${i}`;

    let inputHtml = '';

    if (q.type === 'single') {
      inputHtml = `<div class="options">` +
        q.opts.map((o, oi) => `
          <div class="opt" data-qi="${i}" data-oi="${oi}" onclick="selectSingle(${i},${oi})">
            <div class="opt-check">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="opt-label">${o}</span>
          </div>`).join('') + `</div>`;

    } else if (q.type === 'multi') {
      inputHtml = `<div class="options">` +
        q.opts.map((o, oi) => `
          <div class="opt" data-qi="${i}" data-oi="${oi}" onclick="toggleMulti(${i},${oi})">
            <div class="opt-check-square">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="opt-label">${o}</span>
          </div>`).join('') + `</div>`;

    } else if (q.type === 'number') {
      inputHtml = `<input type="number" class="num-input" id="input-${i}" placeholder="${q.placeholder}" inputmode="numeric" oninput="onTextInput(${i})" onblur="onTextInput(${i})">`;

    } else if (q.type === 'textarea') {
      inputHtml = `<textarea class="text-input" id="input-${i}" rows="4" placeholder="${q.placeholder}" oninput="onTextInput(${i})"></textarea>`;

    } else {
      inputHtml = `<input type="text" class="text-input" id="input-${i}" placeholder="${q.placeholder}" oninput="onTextInput(${i})">`;
    }

    const skipHtml = q.optional ? `<div class="btn-skip" onclick="skipQuestion(${i})">Omitir esta pregunta</div>` : '';

    el.innerHTML = `
      <div class="q-block">${BLOQUE[q.block]}</div>
      <h2 class="q-title">${q.q}</h2>
      ${q.hint ? `<p class="q-hint">${q.hint}</p>` : ''}
      ${inputHtml}
      ${skipHtml}
    `;
    document.getElementById('screens').appendChild(el);
  });
}

function renderFinal() {

  el.className = 'screen';
  el.id = `screen-final`;

// ─── NAVIGATION ───────────────────────────────────────────────────────────
function showScreen(idx) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'exit');
  });

  const id = idx === -1 ? 'screen--1' : idx >= TOTAL ? 'screen-final' : `screen-${idx}`;
  const el = document.getElementById(id);
  if (el) el.classList.add('active');

  // topbar
  const topbar = document.getElementById('topbar');
  if (idx === -1 || idx >= TOTAL) {
    topbar.style.display = 'none';
  } else {
    topbar.style.display = 'block';
    document.getElementById('counter').textContent = `${idx + 1} / ${TOTAL}`;
    document.getElementById('progress').style.width = `${((idx + 1) / TOTAL) * 100}%`;
  }

  // buttons
  const btnBack = document.getElementById('btn-back');
  const btnNext = document.getElementById('btn-next');

  btnBack.disabled = idx <= -1;

  if (idx === -1) {
    btnNext.textContent = 'Empezar';
    btnNext.disabled = false;
    btnNext.className = 'btn-next';
  } else if (idx >= TOTAL) {
    document.getElementById('bottom-nav').style.display = 'none';
  } else {
    btnNext.textContent = idx === TOTAL - 1 ? 'Finalizar' : 'Siguiente';
    btnNext.className = 'btn-next';
    updateNextBtn(idx);
  }
}

function updateNextBtn(idx) {
  const q = questions[idx];
  const btnNext = document.getElementById('btn-next');
  if (!q) return;

  if (q.optional) {
    btnNext.disabled = false;
    return;
  }

  const ans = answers[idx];
  if (q.type === 'single') {
    btnNext.disabled = ans === undefined;
  } else if (q.type === 'multi') {
    btnNext.disabled = !ans || ans.length === 0;
  } else {
    const inp = document.getElementById(`input-${idx}`);
    btnNext.disabled = !inp || !inp.value.trim();
  }
}

function goNext() {
  if (current === -1) {
    current = 0;
    showScreen(0);
    return;
  }
  if (current >= TOTAL) return;

  // save text/number
  const q = questions[current];
  if (q && (q.type === 'text' || q.type === 'number' || q.type === 'textarea')) {
    const inp = document.getElementById(`input-${current}`);
    if (inp) answers[current] = inp.value.trim();
  }

  current++;
  showScreen(current);
}

function goBack() {
  if (current <= 0) {
    current = -1;
    showScreen(-1);
    return;
  }
  current--;
  showScreen(current);

  // restore text
  const q = questions[current];
  if (q && (q.type === 'text' || q.type === 'number' || q.type === 'textarea')) {
    const inp = document.getElementById(`input-${current}`);
    if (inp && answers[current] !== undefined) inp.value = answers[current];
  }
}

function skipQuestion(idx) {
  answers[idx] = '—';
  current++;
  showScreen(current);
}

// ─── INPUT HANDLERS ───────────────────────────────────────────────────────
function selectSingle(qi, oi) {
  answers[qi] = questions[qi].opts[oi];
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach((el, i) => {
    el.classList.toggle('selected', i === oi);
  });
  updateNextBtn(qi);
  // auto-advance after short delay
  setTimeout(() => { if (current === qi) goNext(); }, 320);
}

function toggleMulti(qi, oi) {
  if (!answers[qi]) answers[qi] = [];
  const val = questions[qi].opts[oi];
  const idx2 = answers[qi].indexOf(val);
  if (idx2 === -1) answers[qi].push(val);
  else answers[qi].splice(idx2, 1);

  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach((el, i) => {
    el.classList.toggle('selected', answers[qi].includes(questions[qi].opts[i]));
  });
  updateNextBtn(qi);
}

function onTextInput(qi) {
  const inp = document.getElementById(`input-${qi}`);
  if (inp) answers[qi] = inp.value.trim();
  updateNextBtn(qi);
}

// ─── WHATSAPP ─────────────────────────────────────────────────────────────
function sendWhatsApp() {
  let msg = "📋 *DIAGNÓSTICO DIGITAL — ORGÁNICA DE CAZA*\n\n";

  let lastBlock = null;
  questions.forEach((q, i) => {
    if (q.block !== lastBlock) {
      msg += `\n*── ${BLOQUE[q.block]} ──*\n`;
      lastBlock = q.block;
    }
    const ans = answers[i];
    let ansStr = '—';
    if (ans !== undefined && ans !== '—') {
      ansStr = Array.isArray(ans) ? ans.join(', ') : String(ans);
    }
    msg += `*${q.q}*\n${ansStr}\n\n`;
  });

  const phone = "34644917076";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ─── INIT ─────────────────────────────────────────────────────────────────
init();
